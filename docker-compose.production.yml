services:
  db:
    image: mysql:8.0
    container_name: crumbcode-mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
    volumes:
      - crumbcode_data:/var/lib/mysql
    healthcheck:
      test:
        [
          "CMD",
          "mysqladmin",
          "ping",
          "-h",
          "localhost",
          "-u",
          "${MYSQL_USER:-root}",
          "-p${MYSQL_PASSWORD}",
        ]
      timeout: 20s
      retries: 15
      interval: 5s
      start_period: 60s
    restart: unless-stopped
    networks:
      - crumbcode_network

  db-migrate:
    image: ${BACKEND_IMAGE:-rudrprasad/crumbcode-api}:${BACKEND_VERSION:-latest}
    depends_on:
      db:
        condition: service_healthy
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ConnectionStrings__DefaultConnection: server=db;port=3306;database=${MYSQL_DATABASE};user=${MYSQL_USER:-root};password=${MYSQL_PASSWORD};AllowPublicKeyRetrieval=True;SslMode=None;Connection Timeout=60;Default Command Timeout=300;
      Backend__Url: http://+:5080
      Frontend__Url: ${Frontend__Url:-http://localhost:3000}
      AllowedHosts: ${AllowedHosts:-*}
      AllowedOrigins: ${AllowedOrigins:-http://localhost:3000}
      JWT__Issuer: ${JWT__Issuer:-http://backend:5080}
      JWT__Audience: ${JWT__Audience:-http://frontend:3000}
      JWT__SigningKey: ${JWT_SIGNING_KEY}
      AWS_S3__AccessKey: ${AWS_S3__AccessKey}
      AWS_S3__SecretKey: ${AWS_S3__SecretKey}
      AWS_S3__BucketName: ${AWS_S3__BucketName}
      AWS_S3__FolderName: ${AWS_S3__FolderName}
      AWS_S3__Region: ${AWS_S3__Region}
      AWS_S3__ServiceURL: ${AWS_S3__ServiceURL}
    command: ["dotnet", "CrumbCodeBackend.dll", "--migrate"]
    restart: "no"
    networks:
      - crumbcode_network

  backend:
    image: ${BACKEND_IMAGE:-rudrprasad/crumbcode-api}:${BACKEND_VERSION:-latest}
    depends_on:
      db:
        condition: service_healthy
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:5080
      ConnectionStrings__DefaultConnection: server=db;port=3306;database=${MYSQL_DATABASE};user=${MYSQL_USER:-root};password=${MYSQL_PASSWORD};AllowPublicKeyRetrieval=True;SslMode=None;Connection Timeout=60;Default Command Timeout=300;
      Backend__Url: ${Backend__Url:-http://+:5080}
      Frontend__Url: ${Frontend__Url:-http://localhost:3000}
      AllowedHosts: ${AllowedHosts:-*}
      AllowedOrigins: ${AllowedOrigins:-http://localhost:3000}
      JWT__Issuer: ${JWT__Issuer:-http://backend:5080}
      JWT__Audience: ${JWT__Audience:-http://frontend:3000}
      JWT__SigningKey: ${JWT_SIGNING_KEY}
      AWS_S3__AccessKey: ${AWS_S3__AccessKey}
      AWS_S3__SecretKey: ${AWS_S3__SecretKey}
      AWS_S3__BucketName: ${AWS_S3__BucketName}
      AWS_S3__FolderName: ${AWS_S3__FolderName}
      AWS_S3__Region: ${AWS_S3__Region}
      AWS_S3__ServiceURL: ${AWS_S3__ServiceURL}
    ports:
      - "${BACKEND_PORT:-5080}:5080"
    restart: unless-stopped
    networks:
      - crumbcode_network

  frontend:
    image: ${FRONTEND_IMAGE:-rudrprasad/crumbcode-web}:${FRONTEND_VERSION:-latest}
    depends_on:
      - backend
    environment:
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:5080/api/}
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    restart: unless-stopped
    networks:
      - crumbcode_network

volumes:
  crumbcode_data:

networks:
  crumbcode_network:
    driver: bridge
